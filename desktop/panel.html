<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Queue Panel</title>
<style>
  :root,
  :root[data-theme="dark"] {
    --app-bg: #202020;
    --input-bg: #111;
    --row-bg: #2b2b2b;
    --control-bg: #1f1f1f;
    --popup-bg: #252525;
    --pressed-bg: #3a3a3a;
    --control-pressed-bg: #333;
    --selected-bg: #263528;
    --text: #fff;
    --muted-text: #888;
    --subtle-text: #aaa;
    --disabled-text: #555;
    --window-border: #3c3c3c;
    --border: #444;
    --row-border: #3f3f3f;
    --strong-border: #555;
    --divider: rgba(120, 170, 255, 0.15);
    --scrollbar-track: #252525;
    --scrollbar-thumb: #555;
    --scrollbar-thumb-hover: #9db9d9;
    --popup-shadow: rgba(0, 0, 0, 0.35);
    --drag-shadow: rgba(0, 0, 0, 0.45);
    --active-soft: rgba(255, 179, 0, 0.05);
    --placeholder-bg: rgba(255, 179, 0, 0.06);
    --link: #7f9fc4;
    --accent: #ffb300;
    --accent-border: #806322;
    --success: #4caf50;
    --danger: #ff5252;
  }

  :root[data-theme="light"] {
    --app-bg: #e9edf1;
    --input-bg: #f7f9fb;
    --row-bg: #f8fafb;
    --control-bg: #eef2f5;
    --popup-bg: #f8fafb;
    --pressed-bg: #e0e6eb;
    --control-pressed-bg: #d9e1e7;
    --selected-bg: #ddeee3;
    --text: #0d1218;
    --muted-text: #46515c;
    --subtle-text: #515d68;
    --disabled-text: #87919b;
    --window-border: #a8b3bd;
    --border: #aeb9c3;
    --row-border: #b8c3cd;
    --strong-border: #9ca8b3;
    --divider: rgba(44, 91, 148, 0.31);
    --scrollbar-track: #dfe5ea;
    --scrollbar-thumb: #83919e;
    --scrollbar-thumb-hover: #4f789f;
    --popup-shadow: rgba(28, 37, 46, 0.2);
    --drag-shadow: rgba(28, 37, 46, 0.28);
    --active-soft: rgba(216, 137, 0, 0.11);
    --placeholder-bg: rgba(216, 137, 0, 0.1);
    --link: #2f6496;
    --accent: #d88900;
    --accent-border: #c58200;
    --success: #23812e;
    --danger: #d12f2f;
  }

  body {
    margin: 0;
    height: 100vh;
    font-family: Segoe UI, Arial, sans-serif;
    font-size: 14px;
    background: var(--app-bg);
    color: var(--text);
    border: 1px solid var(--window-border);
    box-sizing: border-box;
    padding: 10px 12px;
    overflow: hidden;
  }

  .hidden { display: none; }

  .header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 5px;
    margin-bottom: 4px;
    font-weight: 600;
  }

  #customRideMenuView .header {
    margin-bottom: 8px;
  }

  .home-header {
    grid-template-columns: auto auto auto auto 1fr auto;
  }

  .header:not(.home-header) > .icon-btn:first-child {
    transform: translateY(-2px);
  }

  .title {
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: none;
    -webkit-user-select: none;
  }

  button {
    font-family: Segoe UI, Arial, sans-serif;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    font-size: 16px;
    padding: 0 2px;
    line-height: 1;
  }

  .icon-btn.home-btn {
    font-size: 20px;
  }

  .icon-btn:hover,
  .icon-btn.active {
    color: var(--accent);
  }

  .icon-btn:disabled {
    color: var(--disabled-text);
    cursor: default;
  }

  .context-menu {
    position: fixed;
    z-index: 20;
    background: var(--popup-bg);
    border: 1px solid var(--strong-border);
    box-shadow: 0 4px 12px var(--popup-shadow);
    padding: 4px;
    min-width: 145px;
  }

  .context-menu button {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    cursor: pointer;
    padding: 6px 8px;
    text-align: left;
    font-size: 13px;
  }

  .context-menu button:hover {
    background: var(--pressed-bg);
    color: var(--accent);
  }

  .arrow-btn {
    font-size: 13px;
  }

  .settings-option {
    width: 100%;
    background: var(--row-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    margin-bottom: 8px;
    text-align: left;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
  }

  .settings-option:hover {
    background: var(--pressed-bg);
  }

  .section-break {
    border-top: 1px solid var(--strong-border);
    margin: 14px 0;
  }

  .muted {
    color: var(--muted-text);
    line-height: 1.45;
  }

  .source-line {
    display: block;
    color: var(--link);
    font-size: 11px;
    text-align: center;
    margin-bottom: 3px;
    text-decoration: none;
    cursor: pointer;
  }

  .source-line:hover {
    color: var(--accent);
  }

  .header-divider {
    height: 1px;
    margin: 3px 8px 5px 8px;
    background: var(--divider);
  }

  .custom-ride-divider {
    height: 1px;
    margin: 5px 8px;
    background: var(--divider);
  }

  .add-divider-row {
    cursor: pointer;
  }

  .add-divider-row .ride-name,
  .add-divider-row .icon-btn {
    transition: color 0.15s ease;
  }

  .add-divider-row:hover .ride-name,
  .add-divider-row:hover .icon-btn {
    color: var(--accent);
  }

  .add-favorite-park-row,
  .add-favorite-ride-row {
    cursor: pointer;
  }

  .add-favorite-park-row .park-name,
  .add-favorite-ride-row .ride-name {
    transition: color 0.15s ease;
  }

  .add-favorite-park-row:hover .park-name,
  .add-favorite-park-row:hover .favorite-park-btn,
  .add-favorite-ride-row:hover .ride-name,
  .add-favorite-ride-row:hover .ride-star-btn {
    color: var(--accent);
  }

  .custom-menu-row {
    cursor: pointer;
  }

  .custom-menu-row .menu-label,
  .custom-menu-row .menu-arrow {
    transition: color 0.15s ease;
  }

  .custom-menu-row:hover .menu-label,
  .custom-menu-row:hover .menu-arrow {
    color: var(--accent);
  }

  .menu-label {
    flex: 1;
    min-width: 0;
  }

  .menu-arrow {
    padding-right: 2px;
  }

  .add-custom-list-row {
    cursor: pointer;
  }

  .add-custom-list-row .park-name {
    transition: color 0.15s ease;
  }

  .add-custom-list-row:hover .park-name,
  .add-custom-list-row:hover .icon-btn {
    color: var(--accent);
  }

  .choose-source-park-row {
    cursor: pointer;
  }

  .choose-source-park-row .park-name {
    transition: color 0.15s ease;
  }

  .choose-source-park-row:hover .park-name,
  .choose-source-park-row:hover .icon-btn {
    color: var(--accent);
  }

  #mainView {
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  #mainView.hidden {
    display: none;
  }

  #customRideOrderView {
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  #parkPickerView,
  #ridePickerView,
  #customSourceParkPickerView {
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  #parkPickerView.hidden,
  #ridePickerView.hidden,
  #customSourceParkPickerView.hidden,
  #customRideOrderView.hidden {
    display: none;
  }

  #parkPickerView .scroll-list,
  #ridePickerView .scroll-list,
  #customSourceParkPickerView .scroll-list,
  #customRideOrderList {
    flex: 1;
    min-height: 0;
  }

  #rideList {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: 0;
  }

  #rideList.has-scrollbar .ride {
    padding-right: 10px;
  }

  #rideList::-webkit-scrollbar {
    width: 10px;
  }

  #rideList::-webkit-scrollbar-track {
    background: var(--scrollbar-track);
    border-radius: 5px;
  }

  #rideList::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 5px;
    border: 2px solid var(--scrollbar-track);
  }

  #rideList::-webkit-scrollbar-thumb:hover {
    background: var(--scrollbar-thumb-hover);
  }

  .scroll-list::-webkit-scrollbar {
    width: 10px;
  }

  .scroll-list::-webkit-scrollbar-track {
    background: var(--scrollbar-track);
    border-radius: 5px;
  }

  .scroll-list::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 5px;
    border: 2px solid var(--scrollbar-track);
  }

  .scroll-list::-webkit-scrollbar-thumb:hover {
    background: var(--scrollbar-thumb-hover);
  }

  .ride {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    line-height: 1.6;
  }

  #mainView.wait-list-large #parkTitle {
    font-size: 16px;
    line-height: 1.25;
  }

  #mainView.wait-list-large .ride {
    font-size: 16px;
    line-height: 1.85;
  }

  .ride-name,
  .park-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ride-source {
    display: block;
    color: var(--muted-text);
    font-size: 11px;
    margin-top: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .low { color: var(--success); }
  .medium { color: var(--accent); }
  .high { color: var(--danger); }
  .closed { color: var(--muted-text); }

  input {
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 8px;
    padding: 7px 8px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
  }

  input:focus {
    outline: 1px solid var(--accent);
    border-color: var(--accent);
  }

  .filter-control {
    position: relative;
    margin-bottom: 8px;
  }

  .filter-control input {
    margin-bottom: 0;
    padding-right: 30px;
  }

  .filter-clear-btn {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border: none;
    background: transparent;
    color: var(--subtle-text);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0;
  }

  .filter-clear-btn:hover {
    color: var(--accent);
  }

  .title-rename-control,
  .inline-rename-control {
    position: relative;
    flex: 1;
    min-width: 0;
  }

  .title-rename-input,
  .inline-rename-control .custom-park-name-input {
    width: 100%;
    margin: 0;
    padding-right: 28px;
  }

  .rename-clear-btn {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border: none;
    background: transparent;
    color: var(--subtle-text);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0;
  }

  .rename-clear-btn:hover {
    color: var(--accent);
  }

  .custom-park-name-input {
    margin: 0;
    padding: 0;
    width: auto;
    min-width: 0;
    flex: 1;
    background: transparent;
    border: 1px solid transparent;
    outline: none;
    color: inherit;
    font: inherit;
    transition: border-color 0.15s ease;
  }

  .picker-row:hover .custom-park-name-input {
    border-color: var(--accent);
    background: var(--active-soft);
  }

  .custom-park-name-input:hover,
  .custom-park-name-input:focus {
    border-color: var(--accent);
  }

  .scroll-list {
    overflow-y: auto;
    padding-right: 4px;
  }

  .picker-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--row-bg);
    border: 1px solid var(--row-border);
    color: var(--text);
    padding: 6px 8px;
    margin-bottom: 5px;
    box-sizing: border-box;
  }

  .picker-row.selected {
    background: var(--selected-bg);
  }

  .row-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .order-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 6px;
    align-items: center;
    background: var(--row-bg);
    border: 1px solid var(--row-border);
    padding: 6px 8px;
    margin-bottom: 5px;
  }

  .small-btn {
    background: var(--control-bg);
    border: 1px solid var(--strong-border);
    color: var(--text);
    cursor: pointer;
    min-width: 26px;
    height: 24px;
  }

  #customRideOrderList .small-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
  }

  .small-btn:hover {
    color: var(--accent);
    background: var(--control-pressed-bg);
  }

  .small-btn:disabled {
    color: var(--disabled-text);
    cursor: default;
  }

  .drag-handle {
    color: var(--subtle-text);
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .drag-handle:active {
    cursor: grabbing;
  }

  .drag-placeholder {
    margin-bottom: 5px;
    border: 1px dashed var(--accent);
    background: var(--placeholder-bg);
    box-sizing: border-box;
  }

  .drag-ghost {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.95;
    box-shadow: 0 6px 18px var(--drag-shadow);
  }

  .settings-section {
    margin-bottom: 14px;
  }

  .settings-heading,
  .about-heading {
    color: var(--link);
    font-size: 12px;
    font-weight: 600;
    margin: 0 0 6px 0;
  }

  .option-group {
    display: grid;
    gap: 5px;
  }

  .option-row {
    background: var(--row-bg);
    border: 1px solid var(--row-border);
    color: var(--text);
    padding: 7px 8px;
    text-align: left;
    font-size: 14px;
    cursor: pointer;
  }

  .option-row:hover {
    background: var(--pressed-bg);
    color: var(--accent);
  }

  .option-row.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .about-content {
    padding-top: 12px;
    text-align: center;
  }

  .about-title {
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .about-version {
    margin-bottom: 18px;
  }

  .about-link {
    display: block;
    color: var(--link);
    text-decoration: none;
  }

  .about-link:hover {
    color: var(--accent);
  }

</style>
</head>

<body>
  <div id="mainView">
    <div class="header home-header">
      <button id="homeBtn" class="icon-btn home-btn" title="Go to home park">⌂</button>
      <button id="prevParkBtn" class="icon-btn arrow-btn" title="Previous favorite park">◁</button>
      <button id="nextParkBtn" class="icon-btn arrow-btn" title="Next favorite park">▷</button>
      <button id="refreshBtn" class="icon-btn" title="Refresh">↻</button>
      <span id="parkTitle" class="title">No park selected</span>
      <button id="settingsBtn" class="icon-btn home-btn" title="Park list">⚙</button>
    </div>

    <a
      id="sourceStatus"
      class="source-line"
      href="#"
      target="_blank"
    >
      Powered by Queue-Times.com • Never updated
    </a>

          <div class="header-divider"></div>

    <div id="rideList"></div>

    <div id="homeContextMenu" class="context-menu hidden">
       <button id="setHomeParkBtn" type="button">Set as Home Park</button>
    </div>

  </div>

  <div id="parkPickerView" class="hidden">
    <div class="header">
      <button id="parkPickerBackBtn" class="icon-btn">←</button>
      <span class="title">Parks</span>
      <span></span>
    </div>

    <div class="filter-control">
      <input id="parkFilter" type="text" placeholder="Filter parks..." />
      <button id="parkFilterClear" class="filter-clear-btn hidden" type="button" title="Clear filter">&times;</button>
    </div>
    <div id="allParkList" class="scroll-list"></div>
  </div>

  <div id="customRideMenuView" class="hidden">
    <div class="header">
      <button id="customRideMenuBackBtn" class="icon-btn">←</button>
      <span id="customRideMenuTitle" class="title"></span>
      <span></span>
    </div>

    <div id="customAddRidesBtn" class="picker-row custom-menu-row">
      <span class="menu-label">Add Rides</span>

      <span class="row-actions">
        <span class="menu-arrow">›</span>
      </span>
    </div>

    <div id="customReorderRidesBtn" class="picker-row custom-menu-row">
      <span class="menu-label">Manage Ride List</span>

      <span class="row-actions">
        <span class="menu-arrow">›</span>
      </span>
    </div>

    <div id="customDeleteListBtn" class="picker-row custom-menu-row">
      <span class="menu-label">Delete Custom Ride List</span>
      <span></span>
    </div>
  </div>

  <div id="customSourceParkPickerView" class="hidden">
    <div class="header">
      <button id="customSourceParkBackBtn" class="icon-btn">←</button>
      <span id="customSourceParkTitle" class="title">Choose Source Parks</span>
      <span></span>
    </div>

    <div class="filter-control">
      <input id="customSourceParkFilter" type="text" placeholder="Filter parks..." />
      <button id="customSourceParkFilterClear" class="filter-clear-btn hidden" type="button" title="Clear filter">&times;</button>
    </div>
    <div id="customSourceParkList" class="scroll-list"></div>
  </div>

  <div id="customRideOrderView" class="hidden">
    <div class="header">
      <button id="customRideOrderBackBtn" class="icon-btn">←</button>
      <span id="customRideOrderTitle" class="title">Reorder Custom List</span>
      <span></span>
    </div>

    <div id="customRideOrderList" class="scroll-list"></div>
  </div>

  <div id="ridePickerView" class="hidden">
    <div class="header">
      <button id="ridePickerBackBtn" class="icon-btn">←</button>
      <span id="ridePickerTitle" class="title">Favorite Rides</span>
      <span></span>
    </div>

    <div class="filter-control">
      <input id="rideFilter" type="text" placeholder="Filter rides..." />
      <button id="rideFilterClear" class="filter-clear-btn hidden" type="button" title="Clear filter">&times;</button>
    </div>
    <div id="allRideList" class="scroll-list"></div>
  </div>

  <div id="settingsView" class="hidden">
    <div class="header">
      <button id="settingsBackBtn" class="icon-btn">&#8592;</button>
      <span class="title">Settings</span>
      <span></span>
    </div>

    <div class="settings-section">
      <div class="settings-heading">Theme</div>
      <div class="option-group">
        <button id="themeLightBtn" class="option-row" type="button">Light</button>
        <button id="themeDarkBtn" class="option-row" type="button">Dark</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-heading">Time format</div>
      <div class="option-group">
        <button id="timeFormat12Btn" class="option-row" type="button">12-hour</button>
        <button id="timeFormat24Btn" class="option-row" type="button">24-hour</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-heading">Wait List Text Size</div>
      <div class="option-group">
        <button id="waitListTextSmallBtn" class="option-row" type="button">Small</button>
        <button id="waitListTextLargeBtn" class="option-row" type="button">Large</button>
      </div>
    </div>
  </div>

  <div id="aboutView" class="hidden">
    <div class="header">
      <button id="aboutBackBtn" class="icon-btn">&#8592;</button>
      <span class="title">About</span>
      <span></span>
    </div>

    <div class="about-content">
      <div id="aboutAppName" class="about-title">Queue Panel</div>
      <div id="aboutVersion" class="muted about-version">Version</div>
      <a id="aboutQueueTimesLink" class="about-link" href="#">Powered by Queue-Times.com</a>
    </div>
  </div>

  <script src="../shared/queue-panel-shared.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
